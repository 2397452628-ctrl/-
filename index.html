            { date: "6.20", weekday: "周五", week: "W14", phase: "线代强化", phaseClass: "phase-lin-adv", content: "强化第11讲 二次型强化(1)", task: "听课+例题重做；正交变换化标准型、配方法", action: "正交变换步骤再巩固" },

            // ========== W15 总复盘 (6.21-6.30) ==========
            { date: "6.21", weekday: "周六", week: "W15", phase: "线代强化", phaseClass: "phase-lin-adv", content: "强化第12讲 二次型强化(2)", task: "听课+例题重做；正定二次型、正定矩阵判定", action: "正定判定三种方法熟练切换" },
            { date: "6.22", weekday: "周日", week: "W15", phase: "线代强化", phaseClass: "phase-lin-adv", content: "【周日复盘】", task: "线代强化讲义错题重刷；二次型大题限时练（2道）", action: "线代强化收尾准备" },
            { date: "6.23", weekday: "周一", week: "W15", phase: "线代强化", phaseClass: "phase-lin-adv", content: "强化第13讲 二次型强化(3)", task: "听课+例题重做；二次型综合题、矩阵等价合同相似综合", action: "综合题打通任督二脉" },
            { date: "6.24", weekday: "周二", week: "W15", phase: "线代强化", phaseClass: "phase-lin-adv", content: "强化第14讲 线代综合强化(1)", task: "听课+例题重做；线代六大题型串讲（1）", action: "建立“线代6大题型卡”" },
            { date: "6.25", weekday: "周三", week: "W15", phase: "线代强化", phaseClass: "phase-lin-adv", content: "强化第15讲 线代综合强化(2)+线代强化收尾", task: "听课+例题重做；线代六大题型串讲（2）；线代强化全部结束", action: "《考点全刷》强化篇线代部分收尾" },
            { date: "6.26", weekday: "周四", week: "W15", phase: "总复盘", phaseClass: "phase-review", content: "总复盘：高数基础错题清零(1)", task: "极限至导数章节错题全部重算；标记仍错的题", action: "错题清零行动开始" },
            { date: "6.27", weekday: "周五", week: "W15", phase: "总复盘", phaseClass: "phase-review", content: "总复盘：高数基础错题清零(2)", task: "积分至定积分应用章节错题全部重算", action: "计算题必须手算到底" },
            { date: "6.28", weekday: "周六", week: "W15", phase: "总复盘", phaseClass: "phase-review", content: "总复盘：线代基础/强化错题清零+公式手册定稿", task: "线代全部错题重算；高数线代公式浓缩至各1页A4纸", action: "公式手册定稿" },
            { date: "6.29", weekday: "周日", week: "W15", phase: "总复盘", phaseClass: "phase-review", content: "【周日复盘】全科公式默写+阶段自测", task: "高数线代公式完整默写2轮；模拟自测选填40题", action: "暴露最后漏洞" },
            { date: "6.30", weekday: "周一", week: "W15", phase: "总复盘", phaseClass: "phase-review", content: "【最终检验】", task: "遮住答案，高数+线代讲义例题随机抽30道，要求80%流畅写出", action: "达标则庆祝；未达标针对性加练" }
        ];

        let currentFilter = 'all';
        let savedProgress = JSON.parse(localStorage.getItem('mathDailyPlan') || '[]');
        if (savedProgress.length !== dailyData.length) {
            savedProgress = new Array(dailyData.length).fill(false);
        }

        function init() {
            renderTable();
            updateStats();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            dailyData.forEach((item, index) => {
                if (currentFilter !== 'all' && item.phase !== currentFilter) return;
                
                const isWeekend = item.weekday === '周日';
                const isCompleted = savedProgress[index];
                
                const tr = document.createElement('tr');
                tr.id = `row-${index}`;
                if (isCompleted) tr.classList.add('completed');
                if (isWeekend) tr.classList.add('weekend-row');
                
                tr.innerHTML = `
                    <td class="check-cell">
                        <div class="checkbox-wrapper ${isCompleted ? 'checked' : ''}" 
                             onclick="toggleCheck(${index})" id="check-${index}"></div>
                    </td>
                    <td class="date-col">
                        <span class="weekday">${isWeekend ? '🟧 ' : ''}${item.weekday}</span><br>
                        <span style="font-size:11px;color:#718096">${item.date}</span>
                    </td>
                    <td class="week-col">${item.week}</td>
                    <td><span class="phase-badge ${item.phaseClass}">${item.phase}</span></td>
                    <td>${item.content}</td>
                    <td class="task-cell">${item.task}</td>
                    <td class="action-cell">${item.action}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function toggleCheck(index) {
            savedProgress[index] = !savedProgress[index];
            localStorage.setItem('mathDailyPlan', JSON.stringify(savedProgress));
            
            const checkbox = document.getElementById(`check-${index}`);
            const row = document.getElementById(`row-${index}`);
            
            if (savedProgress[index]) {
                checkbox.classList.add('checked');
                row.classList.add('completed');
            } else {
                checkbox.classList.remove('checked');
                row.classList.remove('completed');
            }
            
            updateStats();
        }

        function updateStats() {
            const completed = savedProgress.filter(v => v).length;
            const total = dailyData.length;
            const percent = Math.round((completed / total) * 100);
            
            // 计算连续打卡
            let streak = 0;
            for (let i = 0; i < savedProgress.length; i++) {
                if (savedProgress[i]) streak++;
                else break;
            }
            
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('remainingCount').textContent = total - completed;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('streakCount').textContent = streak;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function filterPhase(phase) {
            currentFilter = phase;
            document.querySelectorAll('.filter-tag').forEach(tag => tag.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function markAllDone() {
            if (!confirm('确定要将全部108天标记为已完成吗？')) return;
            savedProgress = new Array(dailyData.length).fill(true);
            localStorage.setItem('mathDailyPlan', JSON.stringify(savedProgress));
            renderTable();
            updateStats();
        }

        function resetAll() {
            if (!confirm('确定要清空所有打卡进度吗？此操作不可恢复。')) return;
            savedProgress = new Array(dailyData.length).fill(false);
            localStorage.setItem('mathDailyPlan', JSON.stringify(savedProgress));
            renderTable();
            updateStats();
        }

        function exportExcel() {
            const data = dailyData.map((item, i) => ({
                "打卡状态": savedProgress[i] ? "✅ 已完成" : "⬜ 未完成",
                "日期": item.date,
                "星期": item.weekday,
                "周次": item.week,
                "阶段": item.phase,
                "课程/任务": item.content,
                "具体产出": item.task,
                "关键动作": item.action
            }));
            
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "每日打卡计划");
            ws['!cols'] = [
                {wch: 12}, {wch: 8}, {wch: 8}, {wch: 6}, {wch: 12},
                {wch: 40}, {wch: 50}, {wch: 35}
            ];
            XLSX.writeFile(wb, "2027考研数学二_3.15-6.30每日打卡计划.xlsx");
        }

        function exportWord() {
            let html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' 
                      xmlns:w='urn:schemas-microsoft-com:office:word' 
                      xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>每日打卡计划</title>
                <style>
                    body { font-family: "Microsoft YaHei", sans-serif; font-size: 11px; }
                    table { border-collapse: collapse; width: 100%; }
                    th, td { border: 1px solid #333; padding: 6px; text-align: left; }
                    th { background-color: #667eea; color: white; }
                    .done { background-color: #f0fff4; }
                    h1 { text-align: center; color: #2d3748; font-size: 18px; }
                </style></head>
                <body>
                    <h1>2027考研数学二 · 3.15-6.30 每日打卡计划</h1>
                    <table>
                        <tr>
                            <th>打卡状态</th><th>日期</th><th>星期</th><th>周次</th>
                            <th>阶段</th><th>课程/任务</th><th>具体产出</th><th>关键动作</th>
                        </tr>
            `;
            
            dailyData.forEach((item, i) => {
                const done = savedProgress[i];
                html += `<tr class="${done ? 'done' : ''}">
                    <td>${done ? '✅ 已完成' : '⬜ 未完成'}</td>
                    <td>${item.date}</td><td>${item.weekday}</td><td>${item.week}</td>
                    <td>${item.phase}</td><td>${item.content}</td>
                    <td>${item.task}</td><td>${item.action}</td>
                </tr>`;
            });
            
            html += `</table></body></html>`;
            
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = '2027考研数学二_3.15-6.30每日打卡计划.doc';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        init();
    </script>
</body>
